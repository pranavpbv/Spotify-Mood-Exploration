<!DOCTYPE html>
<html>
<head>
<title>Spotify Mood Exploration</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: black;
    font-family: helvetica;
  }
  .powerbi-wrapper {
    display: flex;
    justify-content: center;
    width: 100%;
    padding: 40px 0;
    background: black;
  }
  .powerbi-container {
    position: relative;
    width: 70%;
    max-width: 1000px;
    aspect-ratio: 16/9;
    background: black;
    overflow: hidden;
  }
  .powerbi-container iframe {
    position: absolute;
    top: 0;
    left: -20px;
    width: calc(100% + 40px);
    height: calc(100% + 35px);
    border: none;
  }
  .powerbi-toolbar-cover {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 35px;
    background: black;
    z-index: 10;
    pointer-events: none;
  }
  .powerbi-side-cover-left {
    position: absolute;
    top: 0;
    left: 0;
    width: 25px;
    height: 100%;
    background: black;
    z-index: 10;
    pointer-events: none;
  }
  .powerbi-side-cover-right {
    position: absolute;
    top: 0;
    right: 0;
    width: 25px;
    height: 100%;
    background: black;
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>
<body>

<div style="display: flex; align-items: center; justify-content: center; gap: 20px; color: #1DB954; padding-top: 20px;">
